<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
    <!-- Cercle extérieur -->
    <circle cx="100" cy="100" r="95" fill="none" stroke="#c8963e" stroke-width="3"/>
    <circle cx="100" cy="100" r="85" fill="#1a3a5c"/>
    
    <!-- Poignée de main stylisée -->
    <path d="M60 120 Q70 90 85 85 L90 80 Q95 75 100 80 L105 85 Q120 90 130 120" 
          stroke="#c8963e" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Deux mains -->
    <ellipse cx="75" cy="125" rx="15" ry="8" fill="#e8d5a3"/>
    <ellipse cx="125" cy="125" rx="15" ry="8" fill="#e8d5a3"/>
    
    <!-- Étoile centrale -->
    <polygon points="100,60 105,75 120,75 108,85 112,100 100,90 88,100 92,85 80,75 95,75" 
             fill="#c8963e"/>
    
    <!-- Texte -->
    <text x="100" y="165" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="2">KINSHASA</text>
    <text x="100" y="180" font-family="Arial, sans-serif" font-size="8" fill="#c8963e" text-anchor="middle" letter-spacing="1.5">CHAMBER OF COMMERCE</text>
</svg>
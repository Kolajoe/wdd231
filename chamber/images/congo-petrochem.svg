<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
    <!-- Fond -->
    <rect width="200" height="200" rx="15" fill="#2C3E50"/>
    
    <!-- Flacon / Bécher chimique -->
    <rect x="75" y="60" width="50" height="70" rx="5" fill="#c8963e" opacity="0.3"/>
    <rect x="85" y="40" width="30" height="25" rx="3" fill="none" stroke="#c8963e" stroke-width="2"/>
    <line x1="85" y1="55" x2="115" y2="55" stroke="#c8963e" stroke-width="2"/>
    
    <!-- Gouttes -->
    <circle cx="90" cy="80" r="4" fill="#c8963e"/>
    <circle cx="110" cy="90" r="3" fill="#c8963e"/>
    <circle cx="95" cy="105" r="5" fill="#c8963e" opacity="0.6"/>
    
    <!-- Molécule stylisée -->
    <circle cx="65" cy="50" r="8" fill="none" stroke="#c8963e" stroke-width="2"/>
    <circle cx="135" cy="50" r="8" fill="none" stroke="#c8963e" stroke-width="2"/>
    <line x1="73" y1="50" x2="127" y2="50" stroke="#c8963e" stroke-width="2"/>
    
    <!-- Texte -->
    <text x="100" y="165" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">CONGO PETROCHEM</text>
    <text x="100" y="182" font-family="Arial, sans-serif" font-size="8" fill="#c8963e" text-anchor="middle">INDUSTRIES</text>
</svg>
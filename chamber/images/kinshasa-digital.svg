<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
    <!-- Fond -->
    <rect width="200" height="200" rx="15" fill="#2a7f6e"/>
    
    <!-- Écran d'ordinateur -->
    <rect x="55" y="50" width="90" height="65" rx="5" fill="#1a3a5c"/>
    <rect x="60" y="55" width="80" height="50" rx="2" fill="#e8d5a3" opacity="0.2"/>
    
    <!-- Code HTML simplifié sur l'écran -->
    <text x="70" y="70" font-family="monospace" font-size="8" fill="#c8963e">&lt;code&gt;</text>
    <text x="70" y="85" font-family="monospace" font-size="8" fill="white">Hello World!</text>
    <text x="70" y="100" font-family="monospace" font-size="8" fill="#c8963e">&lt;/code&gt;</text>
    
    <!-- Pied de l'écran -->
    <rect x="85" y="115" width="30" height="5" rx="2" fill="#c8963e"/>
    <rect x="95" y="120" width="10" height="15" rx="2" fill="#c8963e"/>
    
    <!-- Texte -->
    <text x="100" y="165" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">KINSHASA DIGITAL</text>
    <text x="100" y="182" font-family="Arial, sans-serif" font-size="8" fill="#c8963e" text-anchor="middle">HUB</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
    <!-- Fond -->
    <rect width="200" height="200" rx="15" fill="#5D4037"/>
    
    <!-- Montagne / Mine -->
    <polygon points="40,140 100,40 160,140" fill="#c8963e" opacity="0.4"/>
    <polygon points="60,140 100,60 140,140" fill="#c8963e" opacity="0.7"/>
    
    <!-- Train de mine -->
    <rect x="60" y="130" width="80" height="10" rx="2" fill="#e8d5a3" opacity="0.5"/>
    <circle cx="70" cy="145" r="8" fill="#333"/>
    <circle cx="100" cy="145" r="8" fill="#333"/>
    <circle cx="130" cy="145" r="8" fill="#333"/>
    
    <!-- Diamant / Cristal -->
    <polygon points="100,75 110,90 100,105 90,90" fill="#c8963e"/>
    
    <!-- Texte -->
    <text x="100" y="170" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">RDC MINING</text>
    <text x="100" y="187" font-family="Arial, sans-serif" font-size="8" fill="#c8963e" text-anchor="middle">MATERIALS</text>
</svg>
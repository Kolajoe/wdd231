<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
    <!-- Fond -->
    <rect width="200" height="200" rx="15" fill="#1a3a5c"/>
    
    <!-- Camion -->
    <rect x="40" y="90" width="80" height="35" rx="3" fill="#c8963e"/>
    <rect x="40" y="80" width="50" height="15" rx="2" fill="#e8d5a3"/>
    <rect x="90" y="95" width="30" height="25" rx="2" fill="#e8d5a3" opacity="0.3"/>
    
    <!-- Roues -->
    <circle cx="60" cy="125" r="15" fill="none" stroke="#e8d5a3" stroke-width="3"/>
    <circle cx="110" cy="125" r="15" fill="none" stroke="#e8d5a3" stroke-width="3"/>
    <circle cx="60" cy="125" r="6" fill="#c8963e"/>
    <circle cx="110" cy="125" r="6" fill="#c8963e"/>
    
    <!-- Route -->
    <line x1="20" y1="130" x2="180" y2="130" stroke="#c8963e" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
    
    <!-- Texte -->
    <text x="100" y="165" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">KINSHASA LOGISTICS</text>
    <text x="100" y="182" font-family="Arial, sans-serif" font-size="8" fill="#c8963e" text-anchor="middle">GROUP</text>
</svg>